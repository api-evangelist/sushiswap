# SushiSwap GraphQL Schema
# Source: https://github.com/sushiswap/subgraphs
# Combines V2 AMM subgraph and xSushi (SushiBar) subgraph schemas

# ===========================================================================
# V2 AMM Subgraph
# https://github.com/sushiswap/subgraphs/blob/master/subgraphs/v2/schema.graphql
# ===========================================================================

type UniswapFactory @entity {
  # factory address
  id: Bytes!

  # pair info
  pairCount: Int!

  # total volume
  totalVolumeUSD: BigDecimal!
  totalVolumeETH: BigDecimal!

  # untracked values - less confident USD scores
  untrackedVolumeUSD: BigDecimal!

  # total liquidity
  totalLiquidityUSD: BigDecimal!
  totalLiquidityETH: BigDecimal!

  # transactions
  txCount: BigInt!
}

type Token @entity {
  # token address
  id: Bytes!

  # mirrored from the smart contract
  symbol: String!
  name: String!
  decimals: BigInt!

  # used for other stats like marketcap
  totalSupply: BigInt!

  # token specific volume
  tradeVolume: BigDecimal!
  tradeVolumeUSD: BigDecimal!
  untrackedVolumeUSD: BigDecimal!

  # transactions across all pairs
  txCount: BigInt!

  # liquidity across all pairs
  totalLiquidity: BigDecimal!

  # derived prices
  derivedETH: BigDecimal!

  # derived fields
  tokenDayData: [TokenDayData!]! @derivedFrom(field: "token")
  pairDayDataBase: [PairDayData!]! @derivedFrom(field: "token0")
  pairDayDataQuote: [PairDayData!]! @derivedFrom(field: "token1")
  pairBase: [Pair!]! @derivedFrom(field: "token0")
  pairQuote: [Pair!]! @derivedFrom(field: "token1")
}

type Pair @entity {
  # pair address
  id: Bytes!

  # mirrored from the smart contract
  token0: Token!
  token1: Token!
  reserve0: BigDecimal!
  reserve1: BigDecimal!
  totalSupply: BigDecimal!

  # derived liquidity
  reserveETH: BigDecimal!
  reserveUSD: BigDecimal!
  # used for separating per pair reserves and global
  trackedReserveETH: BigDecimal!

  # Price in terms of the asset pair
  token0Price: BigDecimal!
  token1Price: BigDecimal!

  # lifetime volume stats
  volumeToken0: BigDecimal!
  volumeToken1: BigDecimal!
  volumeUSD: BigDecimal!
  untrackedVolumeUSD: BigDecimal!
  txCount: BigInt!

  # creation stats
  createdAtTimestamp: BigInt!
  createdAtBlockNumber: BigInt!

  # Fields used to help derived relationship
  liquidityProviderCount: BigInt!
  # derived fields
  pairHourData: [PairHourData!]! @derivedFrom(field: "pair")
  liquidityPositions: [LiquidityPosition!]! @derivedFrom(field: "pair")
  liquidityPositionSnapshots: [LiquidityPositionSnapshot!]! @derivedFrom(field: "pair")
  mints: [Mint!]! @derivedFrom(field: "pair")
  burns: [Burn!]! @derivedFrom(field: "pair")
  swaps: [Swap!]! @derivedFrom(field: "pair")
}

type User @entity {
  id: Bytes!
  liquidityPositions: [LiquidityPosition!] @derivedFrom(field: "user")
  usdSwapped: BigDecimal!
}

type LiquidityPosition @entity {
  id: Bytes!
  user: User!
  pair: Pair!
  liquidityTokenBalance: BigDecimal!
}

# saved over time for return calculations, gets created and never updated
type LiquidityPositionSnapshot @entity {
  id: Bytes!
  liquidityPosition: LiquidityPosition!
  timestamp: Int!
  block: Int!
  user: User!
  pair: Pair!
  token0PriceUSD: BigDecimal!
  token1PriceUSD: BigDecimal!
  reserve0: BigDecimal!
  reserve1: BigDecimal!
  reserveUSD: BigDecimal!
  liquidityTokenTotalSupply: BigDecimal!
  liquidityTokenBalance: BigDecimal!
}

type Transaction @entity {
  id: Bytes! # txn hash
  blockNumber: BigInt!
  timestamp: BigInt!
  mints: [Mint!]!
  burns: [Burn!]!
  swaps: [Swap!]!
}

type Mint @entity {
  # transaction hash + index in mints Transaction array
  id: Bytes!
  transaction: Transaction!
  timestamp: BigInt!
  pair: Pair!

  # populated from the primary Transfer event
  to: Bytes!
  liquidity: BigDecimal!

  # populated from the Mint event
  sender: Bytes
  amount0: BigDecimal
  amount1: BigDecimal
  logIndex: BigInt
  amountUSD: BigDecimal

  # optional fee fields
  feeTo: Bytes
  feeLiquidity: BigDecimal
}

type Burn @entity {
  # transaction hash + index in mints Transaction array
  id: Bytes!
  transaction: Transaction!
  timestamp: BigInt!
  pair: Pair!

  # populated from the primary Transfer event
  liquidity: BigDecimal!

  # populated from the Burn event
  sender: Bytes
  amount0: BigDecimal
  amount1: BigDecimal
  to: Bytes
  logIndex: BigInt
  amountUSD: BigDecimal

  # mark uncomplete in ETH case
  needsComplete: Boolean!

  # optional fee fields
  feeTo: Bytes
  feeLiquidity: BigDecimal
}

type Swap @entity {
  # transaction hash + index in swaps Transaction array
  id: Bytes!
  transaction: Transaction!
  timestamp: BigInt!
  pair: Pair!

  # populated from the Swap event
  sender: Bytes!
  from: Bytes!
  amount0In: BigDecimal!
  amount1In: BigDecimal!
  amount0Out: BigDecimal!
  amount1Out: BigDecimal!
  to: Bytes!
  logIndex: BigInt

  # derived info
  amountUSD: BigDecimal!
}

# stores for USD calculations
type Bundle @entity {
  id: ID!
  ethPrice: BigDecimal!
}

# Data accumulated and condensed into day stats for all of SushiSwap
type UniswapDayData @entity {
  id: Bytes!
  date: Int!

  dailyVolumeETH: BigDecimal!
  dailyVolumeUSD: BigDecimal!
  dailyVolumeUntracked: BigDecimal!

  totalVolumeETH: BigDecimal!
  totalLiquidityETH: BigDecimal!
  totalVolumeUSD: BigDecimal!
  totalLiquidityUSD: BigDecimal!

  txCount: BigInt!
}

type PairHourData @entity {
  id: Bytes!
  hourStartUnix: Int!
  pair: Pair!

  # reserves
  reserve0: BigDecimal!
  reserve1: BigDecimal!

  # total supply for LP historical returns
  totalSupply: BigDecimal

  # derived liquidity
  reserveUSD: BigDecimal!

  # volume stats
  hourlyVolumeToken0: BigDecimal!
  hourlyVolumeToken1: BigDecimal!
  hourlyVolumeUSD: BigDecimal!
  hourlyTxns: BigInt!
}

type PairDayData @entity {
  id: Bytes!
  date: Int!
  pairAddress: Bytes!
  token0: Token!
  token1: Token!

  # reserves
  reserve0: BigDecimal!
  reserve1: BigDecimal!

  # total supply for LP historical returns
  totalSupply: BigDecimal

  # derived liquidity
  reserveUSD: BigDecimal!

  # volume stats
  dailyVolumeToken0: BigDecimal!
  dailyVolumeToken1: BigDecimal!
  dailyVolumeUSD: BigDecimal!
  dailyTxns: BigInt!
}

type TokenDayData @entity {
  id: Bytes!
  date: Int!
  token: Token!

  # volume stats
  dailyVolumeToken: BigDecimal!
  dailyVolumeETH: BigDecimal!
  dailyVolumeUSD: BigDecimal!
  dailyTxns: BigInt!

  # liquidity stats
  totalLiquidityToken: BigDecimal!
  totalLiquidityETH: BigDecimal!
  totalLiquidityUSD: BigDecimal!

  # price stats
  priceUSD: BigDecimal!
}

# ===========================================================================
# xSushi (SushiBar) Subgraph
# https://github.com/sushiswap/subgraphs/blob/master/subgraphs/xsushi/schema.graphql
# ===========================================================================

type XSushi @entity {
  id: ID! # Hardcoded to 'xSushi'
  userCount: BigInt!
  transactionCount: BigInt!
  sushiSupply: BigInt!
  xSushiSupply: BigInt!
  sushiStaked: BigInt!
  sushiHarvested: BigInt!
  totalFeeAmount: BigInt!
  xSushiBurned: BigInt!
  xSushiMinted: BigInt!
  xSushiSushiRatio: BigDecimal!
  sushiXsushiRatio: BigDecimal!
  apr1m: BigDecimal!
  apr3m: BigDecimal!
  apr6m: BigDecimal!
  apr12m: BigDecimal!
  aprUpdatedAtTimestamp: BigInt!
}

enum TransactionType {
  TRANSFER
  MINT
  BURN
}

type XSushiTransaction @entity {
  id: ID!
  from: XSushiUser!
  to: XSushiUser!
  amount: BigInt!
  type: TransactionType!
  gasUsed: BigInt!
  gasLimit: BigInt!
  gasPrice: BigInt!
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
}

type XSushiUser @entity {
  id: ID!
  balance: BigInt!
  withdrawals: [XSushiTransaction!]! @derivedFrom(field: "from")
  deposits: [XSushiTransaction!]! @derivedFrom(field: "to")
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
  modifiedAtBlock: BigInt!
  modifiedAtTimestamp: BigInt!
}

type FeeSender @entity {
  id: ID!
  totalFeeSent: BigInt!
  fees: [Fee!]! @derivedFrom(field: "sender")
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
  modifiedAtBlock: BigInt!
  modifiedAtTimestamp: BigInt!
}

type Fee @entity {
  id: ID!
  sender: FeeSender!
  amount: BigInt!
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
}

type HourSnapshot @entity {
  id: ID!
  date: Int!
  userCount: BigInt!
  transactionCount: BigInt!
  sushiSupply: BigInt!
  xSushiSupply: BigInt!
  sushiStaked: BigInt!
  sushiHarvested: BigInt!
  totalFeeAmount: BigInt!
  xSushiBurned: BigInt!
  xSushiMinted: BigInt!
  xSushiSushiRatio: BigDecimal!
  sushiXsushiRatio: BigDecimal!
  apr1m: BigDecimal!
  apr3m: BigDecimal!
  apr6m: BigDecimal!
  apr12m: BigDecimal!
  newTransactions: BigInt!
  newSushiStaked: BigDecimal!
  newSushiHarvested: BigDecimal!
  newFeeAmount: BigDecimal!
  newXSushiBurned: BigDecimal!
  newXSushiMinted: BigDecimal!
}

type DaySnapshot @entity {
  id: ID!
  date: Int!
  userCount: BigInt!
  transactionCount: BigInt!
  sushiSupply: BigInt!
  xSushiSupply: BigInt!
  sushiStaked: BigInt!
  sushiHarvested: BigInt!
  totalFeeAmount: BigInt!
  xSushiBurned: BigInt!
  xSushiMinted: BigInt!
  xSushiSushiRatio: BigDecimal!
  sushiXsushiRatio: BigDecimal!
  apr1m: BigDecimal!
  apr3m: BigDecimal!
  apr6m: BigDecimal!
  apr12m: BigDecimal!
  newTransactions: BigInt!
  newSushiStaked: BigDecimal!
  newSushiHarvested: BigDecimal!
  newFeeAmount: BigDecimal!
  newXSushiBurned: BigDecimal!
  newXSushiMinted: BigDecimal!
}

type WeekSnapshot @entity {
  id: ID!
  date: Int!
  userCount: BigInt!
  transactionCount: BigInt!
  sushiSupply: BigInt!
  xSushiSupply: BigInt!
  sushiStaked: BigInt!
  sushiHarvested: BigInt!
  totalFeeAmount: BigInt!
  xSushiBurned: BigInt!
  xSushiMinted: BigInt!
  xSushiSushiRatio: BigDecimal!
  sushiXsushiRatio: BigDecimal!
  apr1m: BigDecimal!
  apr3m: BigDecimal!
  apr6m: BigDecimal!
  apr12m: BigDecimal!
  newTransactions: BigInt!
  newSushiStaked: BigDecimal!
  newSushiHarvested: BigDecimal!
  newFeeAmount: BigDecimal!
  newXSushiBurned: BigDecimal!
  newXSushiMinted: BigDecimal!
}
